org.gradle.jvmargs=-Xmx2g
org.gradle.caching=true
kotlin.stdlib.default.dependency=false

# JDK 21 is required for the toolchain but isn't symlinked into the system
# JVM directory (Homebrew keg-only). Point Gradle at it explicitly so no
# auto-download resolver (Foojay) is needed — that plugin is incompatible
# with Gradle 9.x (NoSuchFieldError: IBM_SEMERU).
org.gradle.java.installations.paths=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
